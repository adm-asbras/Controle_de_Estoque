app = "controle-de-estoque"
primary_region = "gru"

[env]
  PORT = "4000"
  NODE_ENV = "production"
  CORS_ORIGIN = "https://controle-de-estoque.pages.dev"
  FRONTEND_URL = "https://controle-de-estoque.pages.dev"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
